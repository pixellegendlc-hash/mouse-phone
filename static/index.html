<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>👆 Touch Screen</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#0a0a14; color:#fff;
      font-family:'Segoe UI',sans-serif;
      height:100dvh; display:flex; flex-direction:column; overflow:hidden;
    }
    #top-bar {
      padding:8px 14px; background:#12121f;
      display:flex; justify-content:space-between; align-items:center;
      border-bottom:1px solid #222; flex-shrink:0; gap:8px;
    }
    .pill {
      padding:5px 10px; border-radius:20px;
      font-size:11px; font-weight:600; flex:1; text-align:center;
    }
    .pill.green  { background:#003820; color:#00ff88; }
    .pill.red    { background:#380008; color:#ff4466; }
    .pill.yellow { background:#382800; color:#ffcc00; }

    #btn-row {
      padding:8px 14px; background:#12121f;
      display:flex; gap:8px; flex-shrink:0; border-bottom:1px solid #222;
    }
    .btn {
      flex:1; padding:11px; border:none; border-radius:10px;
      font-size:13px; font-weight:600; cursor:pointer;
    }
    .btn-start   { background:linear-gradient(135deg,#6c63ff,#00d4ff); color:#fff; }
    .btn-start:disabled { background:#2a2a40; color:#666; }
    .btn-recalib { background:#2a2a40; color:#aaa; display:none; }

    #zoom-row {
      padding:6px 14px; background:#0f0f1e;
      display:none; align-items:center; gap:10px;
      border-bottom:1px solid #222; flex-shrink:0;
    }
    #zoom-row label { font-size:12px; color:#888; white-space:nowrap; }
    #zoom-slider { flex:1; accent-color:#6c63ff; }
    #zoom-val { font-size:12px; color:#00d4ff; min-width:30px; text-align:right; }

    /* Sensibilità tap */
    #sens-row {
      padding:6px 14px; background:#0f0f1e;
      display:none; align-items:center; gap:10px;
      border-bottom:1px solid #222; flex-shrink:0;
    }
    #sens-row label { font-size:12px; color:#888; white-space:nowrap; }
    #sens-slider { flex:1; accent-color:#ff6b6b; }
    #sens-val { font-size:12px; color:#ff6b6b; min-width:50px; text-align:right; }

    #cam-wrap {
      position:relative; flex:1; overflow:hidden;
      background:#111; min-height:0;
    }
    #video { width:100%; height:100%; object-fit:cover; display:block; }
    #overlay-canvas { position:absolute; inset:0; width:100%; height:100%; }

    #screen-guide {
      position:absolute; inset:10%; border:2px dashed rgba(255,255,255,0.2);
      border-radius:6px; pointer-events:none; z-index:2; display:none;
    }
    #screen-guide::after {
      content:'inquadra lo schermo PC';
      position:absolute; bottom:-22px; left:0; right:0;
      text-align:center; font-size:11px; color:rgba(255,255,255,0.4);
    }

    .corner-marker {
      position:absolute; width:54px; height:54px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:13px; font-weight:bold; border:3px solid; transition:all 0.3s;
    }
    .cm-waiting { border-color:#444; background:rgba(60,60,60,0.3); color:#555; }
    .cm-active  { border-color:#ffcc00; background:rgba(255,204,0,0.25); color:#ffcc00; animation:pulse 0.8s infinite; }
    .cm-done    { border-color:#00ff88; background:rgba(0,255,136,0.2); color:#00ff88; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }

    #step-dots {
      position:absolute; top:10px; left:0; right:0;
      display:flex; justify-content:center; gap:10px; z-index:10;
    }
    .sdot { width:12px; height:12px; border-radius:50%; background:#333; transition:0.3s; }
    .sdot.done   { background:#00ff88; }
    .sdot.active { background:#ffcc00; animation:pulse 0.8s infinite; }

    #instr {
      position:absolute; bottom:22%; left:6%; right:6%;
      background:rgba(0,0,0,0.88); border-radius:14px;
      padding:14px 18px; text-align:center;
      font-size:15px; line-height:1.7; z-index:10;
    }
    #hold-wrap {
      position:absolute; bottom:14%; left:10%; right:10%;
      height:8px; background:#222; border-radius:4px; overflow:hidden; z-index:10;
    }
    #hold-fill {
      height:100%; width:0%;
      background:linear-gradient(90deg,#6c63ff,#00d4ff);
      border-radius:4px; transition:width 0.04s linear;
    }
    #active-hud {
      position:absolute; top:8px; left:8px; right:8px;
      display:flex; gap:6px; z-index:5; flex-wrap:wrap;
    }
    .hbox {
      background:rgba(0,0,0,0.78); border-radius:8px;
      padding:4px 9px; font-size:11px; border:1px solid #2a2a40;
    }
    .hbox b { color:#00d4ff; }

    /* Cursore con ring di feedback */
    #cdot {
      position:absolute; width:24px; height:24px; border-radius:50%;
      background:rgba(108,99,255,0.8); border:2px solid rgba(255,255,255,0.8);
      transform:translate(-50%,-50%); pointer-events:none; z-index:6;
      transition:background 0.08s, width 0.08s, height 0.08s;
    }
    #cdot.ready   { background:rgba(255,200,0,0.85); border-color:#ffcc00; }
    #cdot.touching{ background:rgba(0,255,136,0.9);  border-color:#00ff88; width:34px; height:34px; }

    /* Flash click */
    #click-flash {
      position:absolute; inset:0; background:rgba(0,255,136,0.15);
      pointer-events:none; z-index:7; opacity:0; transition:opacity 0.08s;
    }
    #click-flash.show { opacity:1; }
  </style>
</head>
<body>

<div id="top-bar">
  <span id="pill-server" class="pill red">⬤ Disconnesso</span>
  <span id="pill-state"  class="pill yellow">⬤ In attesa</span>
</div>
<div id="btn-row">
  <button class="btn btn-start"   id="btn-start">📷 Avvia Camera</button>
  <button class="btn btn-recalib" id="btn-recalib">🔄 Ricalibra</button>
</div>
<div id="zoom-row">
  <label>🔍 Zoom:</label>
  <input type="range" id="zoom-slider" min="1" max="5" step="0.1" value="1">
  <span id="zoom-val">1.0×</span>
</div>
<div id="sens-row">
  <label>👆 Sensibilità:</label>
  <input type="range" id="sens-slider" min="1" max="10" step="1" value="5">
  <span id="sens-val">Media</span>
</div>

<div id="cam-wrap">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="overlay-canvas"></canvas>
  <div id="screen-guide"></div>
  <div id="click-flash"></div>

  <div class="corner-marker cm-waiting" id="cm-0" style="top:8px;left:8px">TL</div>
  <div class="corner-marker cm-waiting" id="cm-1" style="top:8px;right:8px">TR</div>
  <div class="corner-marker cm-waiting" id="cm-2" style="bottom:8px;right:8px">BR</div>
  <div class="corner-marker cm-waiting" id="cm-3" style="bottom:8px;left:8px">BL</div>

  <div id="step-dots" style="display:none">
    <div class="sdot" id="sd0"></div><div class="sdot" id="sd1"></div>
    <div class="sdot" id="sd2"></div><div class="sdot" id="sd3"></div>
  </div>
  <div id="instr" style="display:none"></div>
  <div id="hold-wrap" style="display:none"><div id="hold-fill"></div></div>
  <div id="active-hud" style="display:none">
    <div class="hbox" id="hg">🖐 hover</div>
    <div class="hbox">vel: <b id="hv">0.000</b></div>
    <div class="hbox">X:<b id="hx">—</b> Y:<b id="hy">—</b></div>
  </div>
  <div id="cdot" style="display:none"></div>
</div>

<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script>
// ── SOCKET ────────────────────────────────────────────────
const socket = io({ transports:['websocket'] });
socket.on('connect', ()=>{ pill('server','green','⬤ Server OK'); socket.emit('register',{role:'phone'}); });
socket.on('disconnect', ()=>pill('server','red','⬤ Disconnesso'));
function pill(id,cls,txt){ const e=document.getElementById('pill-'+id); e.className='pill '+cls; e.textContent=txt; }

// ── HOMOGRAPHY ────────────────────────────────────────────
function gaussElim(A,b){
  const n=b.length,M=A.map((r,i)=>[...r,b[i]]);
  for(let c=0;c<n;c++){
    let mx=c;
    for(let r=c+1;r<n;r++) if(Math.abs(M[r][c])>Math.abs(M[mx][c])) mx=r;
    [M[c],M[mx]]=[M[mx],M[c]];
    for(let r=c+1;r<n;r++){ const f=M[r][c]/M[c][c]; for(let j=c;j<=n;j++) M[r][j]-=f*M[c][j]; }
  }
  const x=new Array(n).fill(0);
  for(let i=n-1;i>=0;i--){ x[i]=M[i][n]/M[i][i]; for(let j=i+1;j<n;j++) x[i]-=M[i][j]*x[j]/M[i][i]; }
  return x;
}
function computeH(src,dst){
  const A=[],b=[];
  for(let i=0;i<4;i++){
    const [sx,sy]=src[i],[dx,dy]=dst[i];
    A.push([sx,sy,1,0,0,0,-dx*sx,-dx*sy]); b.push(dx);
    A.push([0,0,0,sx,sy,1,-dy*sx,-dy*sy]); b.push(dy);
  }
  const h=gaussElim(A,b);
  return [[h[0],h[1],h[2]],[h[3],h[4],h[5]],[h[6],h[7],1]];
}
function applyH(H,x,y){
  const w=H[2][0]*x+H[2][1]*y+H[2][2];
  return [(H[0][0]*x+H[0][1]*y+H[0][2])/w,(H[1][0]*x+H[1][1]*y+H[1][2])/w];
}

// ── STATO ─────────────────────────────────────────────────
const CORNERS=['Top-Left ↖','Top-Right ↗','Bottom-Right ↘','Bottom-Left ↙'];
const CEMO=['↖','↗','↘','↙'];
let calibPts=[],H=null,state='start';
let holdStart=null; const HOLD_MS=1500;
let touchCool=false; const COOL_MS=600;

// Smoothing posizione (media mobile su N frame)
const POS_BUF=6;
let posHistory=[];
function smoothPos(x,y){
  posHistory.push([x,y]);
  if(posHistory.length>POS_BUF) posHistory.shift();
  const sx=posHistory.reduce((s,p)=>s+p[0],0)/posHistory.length;
  const sy=posHistory.reduce((s,p)=>s+p[1],0)/posHistory.length;
  return [sx,sy];
}

// ── RILEVAMENTO TAP BASATO SU VELOCITÀ ─────────────────────
// Teniamo uno storico della posizione Y del dito negli ultimi N frame
// Quando il dito scende veloce (velocità Y positiva alta) → tap DOWN
// Quando torna su (velocità Y negativa) → tap UP → questo è il click
const VEL_BUF = 8;
let yHistory = [];   // ultimi N valori Y del fingertip
let tapState = 'idle'; // 'idle' | 'down'
let tapPeakY = 0;

// Soglia velocità: regolabile con slider (0.004 = bassa, 0.012 = alta)
let TAP_DOWN_THRESH  = 0.006;
let TAP_UP_THRESH    = -0.003;
let TAP_MIN_EXCURSION = 0.015; // minima escursione verticale del tap

const sensSlider = document.getElementById('sens-slider');
const sensLabels = ['','Molto alta','Alta','Alta','Media','Media','Bassa','Bassa','Molto bassa','Minima','Minima'];
sensSlider.addEventListener('input', ()=>{
  const v = parseInt(sensSlider.value);
  document.getElementById('sens-val').textContent = sensLabels[v];
  // v=1 massima sens (soglie basse), v=10 minima sens (soglie alte)
  TAP_DOWN_THRESH   = 0.002 + (v-1) * 0.0015;
  TAP_UP_THRESH     = -(0.001 + (v-1) * 0.0008);
  TAP_MIN_EXCURSION = 0.008 + (v-1) * 0.003;
});
sensSlider.dispatchEvent(new Event('input')); // init

function updateVelocity(y){
  yHistory.push(y);
  if(yHistory.length > VEL_BUF) yHistory.shift();
  if(yHistory.length < 3) return 0;
  // Velocità = media delle differenze recenti
  let vel=0;
  for(let i=1;i<yHistory.length;i++) vel+=yHistory[i]-yHistory[i-1];
  return vel/(yHistory.length-1);
}

function checkTap(rawY, onTap){
  const vel = updateVelocity(rawY);
  document.getElementById('hv').textContent = vel.toFixed(4);

  if(tapState==='idle'){
    if(vel > TAP_DOWN_THRESH){
      tapState='down';
      tapPeakY=rawY;
    }
  } else if(tapState==='down'){
    tapPeakY=Math.max(tapPeakY, rawY);
    if(vel < TAP_UP_THRESH){
      const excursion = tapPeakY - yHistory[0];
      if(excursion > TAP_MIN_EXCURSION && !touchCool){
        onTap();
        touchCool=true;
        setTimeout(()=>{ touchCool=false; }, COOL_MS);
      }
      tapState='idle';
      yHistory=[];
    }
  }
  return vel;
}

// ── CALIBRAZIONE ──────────────────────────────────────────
function startCalib(){
  calibPts=[]; H=null; state='calibrating';
  posHistory=[]; yHistory=[]; tapState='idle';
  for(let i=0;i<4;i++){
    document.getElementById('cm-'+i).style.display='flex';
    document.getElementById('cm-'+i).className='corner-marker cm-waiting';
    document.getElementById('sd'+i).className='sdot';
  }
  document.getElementById('step-dots').style.display='flex';
  document.getElementById('hold-wrap').style.display='block';
  document.getElementById('screen-guide').style.display='block';
  document.getElementById('active-hud').style.display='none';
  document.getElementById('cdot').style.display='none';
  pill('state','yellow','⬤ Calibrazione');
  updateCalibUI();
}
function updateCalibUI(){
  const s=calibPts.length;
  if(s>=4){ finishCalib(); return; }
  for(let i=0;i<4;i++){
    const cm=document.getElementById('cm-'+i),sd=document.getElementById('sd'+i);
    if(i<s)       { cm.className='corner-marker cm-done';   sd.className='sdot done'; }
    else if(i===s){ cm.className='corner-marker cm-active'; sd.className='sdot active'; }
    else          { cm.className='corner-marker cm-waiting'; sd.className='sdot'; }
  }
  const el=document.getElementById('instr');
  el.style.display='block';
  el.innerHTML=`<div style="font-size:30px;margin-bottom:4px">${CEMO[s]}</div>
    Angolo <b>${CORNERS[s]}</b> dello schermo<br>
    <span style="font-size:12px;color:#aaa;font-weight:normal">tieni il dito fermo 1.5 sec</span>`;
  document.getElementById('hold-fill').style.width='0%';
}
function finishCalib(){
  H=computeH(calibPts,[[0,0],[1,0],[1,1],[0,1]]);
  state='active';
  posHistory=[]; yHistory=[]; tapState='idle';
  document.getElementById('step-dots').style.display='none';
  document.getElementById('instr').style.display='none';
  document.getElementById('hold-wrap').style.display='none';
  document.getElementById('screen-guide').style.display='none';
  document.getElementById('active-hud').style.display='flex';
  document.getElementById('cdot').style.display='block';
  document.getElementById('btn-recalib').style.display='flex';
  document.getElementById('sens-row').style.display='flex';
  for(let i=0;i<4;i++) document.getElementById('cm-'+i).className='corner-marker cm-done';
  pill('state','green','⬤ Attivo 👆');
  setTimeout(()=>{ for(let i=0;i<4;i++) document.getElementById('cm-'+i).style.display='none'; },2500);
}

// ── MEDIAPIPE ─────────────────────────────────────────────
const video=document.getElementById('video');
const canvas=document.getElementById('overlay-canvas');
const ctx=canvas.getContext('2d');
const cdot=document.getElementById('cdot');
const flash=document.getElementById('click-flash');

// Modello 1 = più preciso
const hands=new Hands({ locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
hands.setOptions({
  maxNumHands:1,
  modelComplexity:1,           // ← più preciso
  minDetectionConfidence:0.8,
  minTrackingConfidence:0.75
});
hands.onResults(onResults);

let processing=false;
function frameLoop(){
  requestAnimationFrame(frameLoop);
  if(video.readyState<2||processing) return;
  processing=true;
  hands.send({image:video}).then(()=>{ processing=false; }).catch(()=>{ processing=false; });
}

function triggerClick(mx,my){
  const cx=Math.max(0,Math.min(1,mx));
  const cy=Math.max(0,Math.min(1,my));
  socket.emit('move',{x:cx,y:cy});
  socket.emit('click',{button:'left',x:cx,y:cy});
  // Feedback visivo
  cdot.classList.add('touching');
  flash.classList.add('show');
  document.getElementById('hg').textContent='👆 CLICK!';
  setTimeout(()=>{ cdot.classList.remove('touching'); flash.classList.remove('show'); },200);
}

function onResults(results){
  canvas.width=video.videoWidth||canvas.offsetWidth;
  canvas.height=video.videoHeight||canvas.offsetHeight;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(!results.multiHandLandmarks?.length){
    holdStart=null;
    yHistory=[]; tapState='idle';
    document.getElementById('hold-fill').style.width='0%';
    if(state==='active'){
      document.getElementById('hg').textContent='👋 mano non vista';
      cdot.classList.remove('ready','touching');
    }
    return;
  }

  const lm=results.multiHandLandmarks[0];

  // Disegna con colori migliori
  drawConnectors(ctx,lm,HAND_CONNECTIONS,{color:'rgba(0,212,255,0.6)',lineWidth:3});
  drawLandmarks(ctx,lm,{color:'#ffffff',lineWidth:1,radius:4});
  // Evidenzia punta indice
  ctx.beginPath();
  ctx.arc(lm[8].x*canvas.width,lm[8].y*canvas.height,8,0,Math.PI*2);
  ctx.fillStyle='rgba(255,200,0,0.9)'; ctx.fill();

  const tip=lm[8];
  const rawX=tip.x, rawY=tip.y;

  // ── CALIBRAZIONE ──
  if(state==='calibrating'){
    ctx.beginPath();
    ctx.arc(rawX*canvas.width,rawY*canvas.height,14,0,Math.PI*2);
    ctx.fillStyle='rgba(255,204,0,0.85)'; ctx.fill();
    if(!holdStart){
      holdStart={t:Date.now(),x:rawX,y:rawY};
    } else {
      const moved=Math.hypot(rawX-holdStart.x,rawY-holdStart.y);
      if(moved>0.03){
        holdStart={t:Date.now(),x:rawX,y:rawY};
        document.getElementById('hold-fill').style.width='0%';
      } else {
        const elapsed=Date.now()-holdStart.t;
        document.getElementById('hold-fill').style.width=Math.min(100,(elapsed/HOLD_MS)*100)+'%';
        if(elapsed>=HOLD_MS){ calibPts.push([rawX,rawY]); holdStart=null; updateCalibUI(); }
      }
    }
    return;
  }

  if(state!=='active'||!H) return;

  // Posizione smoothed
  const [sx,sy]=smoothPos(rawX,rawY);
  const [mx,my]=applyH(H,sx,sy);
  const inScreen=mx>=-0.05&&mx<=1.05&&my>=-0.05&&my<=1.05;

  document.getElementById('hx').textContent=mx.toFixed(2);
  document.getElementById('hy').textContent=my.toFixed(2);

  // Cursore visivo
  cdot.style.left=(rawX*100)+'%';
  cdot.style.top=(rawY*100)+'%';

  // Stato cursore
  if(!cdot.classList.contains('touching')){
    if(inScreen){
      cdot.classList.add('ready');
      document.getElementById('hg').textContent='☝️ pronto';
    } else {
      cdot.classList.remove('ready');
      document.getElementById('hg').textContent='↗ fuori area';
    }
  }

  // Invia movimento continuo
  if(inScreen){
    socket.emit('move',{x:Math.max(0,Math.min(1,mx)),y:Math.max(0,Math.min(1,my))});
  }

  // Rilevamento tap basato su velocità
  checkTap(rawY, ()=>{
    if(inScreen) triggerClick(mx,my);
  });
}

// ── ZOOM ──────────────────────────────────────────────────
let videoTrack=null;
const zoomSlider=document.getElementById('zoom-slider');
const zoomValEl=document.getElementById('zoom-val');
let zoomCssMode=false;

zoomSlider.addEventListener('input', async()=>{
  const z=parseFloat(zoomSlider.value);
  zoomValEl.textContent=z.toFixed(1)+'×';
  if(zoomCssMode){
    const scale=1/z;
    video.style.transform=`scale(${scale})`;
    video.style.transformOrigin='center center';
  } else if(videoTrack){
    const caps=videoTrack.getCapabilities();
    if(caps.zoom){
      try{ await videoTrack.applyConstraints({advanced:[{zoom:z}]}); } catch(e){}
    }
  }
});

// ── AVVIO CAMERA ──────────────────────────────────────────
async function startCamera(){
  const btn=document.getElementById('btn-start');
  btn.disabled=true; btn.textContent='⏳ Avvio...';

  const configs=[
    {video:{facingMode:{exact:'environment'}}},
    {video:{facingMode:'environment'}},
    {video:{facingMode:'user'}},
    {video:true}
  ];

  let stream=null;
  for(const cfg of configs){
    try{ stream=await navigator.mediaDevices.getUserMedia(cfg); break; }
    catch(e){ console.warn('Fallito:',e.message); }
  }

  if(!stream){
    btn.disabled=false; btn.textContent='📷 Avvia Camera';
    alert('Camera non disponibile.\nChiudi altre app e riprova.');
    return;
  }

  videoTrack=stream.getVideoTracks()[0];
  const caps=videoTrack.getCapabilities();

  if(caps.zoom){
    const minZ=caps.zoom.min||1, maxZ=caps.zoom.max||5;
    try{ await videoTrack.applyConstraints({advanced:[{zoom:minZ}]}); } catch(e){}
    zoomSlider.min=minZ; zoomSlider.max=maxZ;
    zoomSlider.value=minZ; zoomSlider.step=(maxZ-minZ)/50;
    zoomValEl.textContent=minZ.toFixed(1)+'×';
  } else {
    zoomCssMode=true;
    zoomSlider.min=1; zoomSlider.max=3; zoomSlider.step=0.05; zoomSlider.value=1;
    zoomValEl.textContent='1.0×';
  }
  document.getElementById('zoom-row').style.display='flex';

  video.srcObject=stream;
  await new Promise(res=>{ video.onloadedmetadata=res; });
  await video.play();
  btn.textContent='✅ Camera attiva';
  frameLoop();
  startCalib();
}

document.getElementById('btn-start').addEventListener('click',startCamera);
document.getElementById('btn-recalib').addEventListener('click',()=>{
  for(let i=0;i<4;i++) document.getElementById('cm-'+i).style.display='flex';
  startCalib();
});
